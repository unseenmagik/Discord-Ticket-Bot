<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title if title else 'Ticket Dashboard' }}</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; margin: 0; background: #111827; color: #f3f4f6; }
        a { color: #93c5fd; text-decoration: none; }
        .topbar { position:sticky; top:0; z-index:1000; display:flex; justify-content:space-between; align-items:center; padding:16px 24px; background:rgba(31, 41, 55, 0.96); border-bottom:1px solid #374151; backdrop-filter:blur(10px); }
        .topbar-left { display:flex; align-items:center; gap:24px; }
        .topnav { display:flex; gap:16px; }
        .topnav a { color:#dbeafe; }
        .user-badge { display:flex; align-items:center; gap:10px; }
        .user-badge img { width:32px; height:32px; border-radius:50%; }
        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
        .cards { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:16px; margin:24px 0; }
        .card { background:#1f2937; border-radius:12px; padding:16px; }
        table { width:100%; border-collapse: collapse; background:#1f2937; border-radius:12px; overflow:hidden; }
        th, td { padding:12px; border-bottom:1px solid #374151; text-align:left; }
        th { background:#1f2937; }
        .table-scroll { width:100%; overflow-x:auto; margin-top:12px; }
        .table-scroll table { min-width:100%; }
        .table-wide { min-width:860px; }
        .pill { display:inline-block; padding:4px 10px; border-radius:999px; background:#374151; }
        .open { background:#065f46; }
        .closed { background:#92400e; }
        .deleted { background:#7f1d1d; }
        .tag-pill { display:inline-block; padding:4px 10px; border-radius:999px; background:#1d4ed8; color:#eff6ff; margin:2px 6px 2px 0; font-size:0.88rem; }
        .tag-cluster { display:flex; flex-wrap:wrap; gap:6px; align-items:flex-start; }
        .tag-cluster .tag-pill { margin:0; padding:3px 9px; font-size:0.8rem; line-height:1.15; background:#1e40af; box-shadow:inset 0 0 0 1px rgba(191, 219, 254, 0.12); }
        .filters a { margin-right:12px; }
        .login-box { max-width:420px; margin:80px auto; background:#1f2937; padding:24px; border-radius:12px; }
        input, select { width:100%; padding:10px; margin:8px 0 16px; border-radius:8px; border:1px solid #4b5563; background:#111827; color:#f3f4f6; }
        textarea { width:100%; min-height:120px; padding:10px; margin:8px 0 16px; border-radius:8px; border:1px solid #4b5563; background:#111827; color:#f3f4f6; resize:vertical; }
        button { padding:10px 16px; border:none; border-radius:8px; background:#2563eb; color:white; cursor:pointer; }
        .grid { display:grid; grid-template-columns: 220px 1fr; gap:16px; }
        .label { color:#9ca3af; font-size:0.9rem; }
        .value { font-size:1rem; }
        .stack { display:grid; gap:16px; }
        .split { display:grid; grid-template-columns:repeat(auto-fit, minmax(320px, 1fr)); gap:16px; }
        .section-gap { margin-bottom:16px; }
        .bar-list { display:grid; gap:10px; }
        .bar-row { display:grid; grid-template-columns:minmax(120px, 1fr) minmax(140px, 3fr) auto; gap:10px; align-items:center; }
        .bar-label { color:#e5e7eb; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .bar-track { height:10px; background:#111827; border-radius:999px; overflow:hidden; }
        .bar-fill { height:100%; background:linear-gradient(90deg, #2563eb, #60a5fa); border-radius:999px; }
        .bar-value { color:#d1d5db; font-variant-numeric:tabular-nums; }
        .notice { margin-bottom:16px; padding:12px 14px; border-radius:10px; background:#064e3b; color:#d1fae5; }
        .error-box { margin-bottom:16px; padding:12px 14px; border-radius:10px; background:#7f1d1d; color:#fecaca; overflow-wrap:anywhere; }
        .muted { color:#9ca3af; }
        .help { font-size:0.92rem; color:#9ca3af; margin-top:-8px; margin-bottom:16px; }
        .inline-form { display:grid; grid-template-columns:minmax(220px, 1fr) minmax(220px, 1fr) auto; column-gap:24px; row-gap:16px; align-items:end; margin-top:8px; }
        .inline-form input, .inline-form select { margin-bottom:0; }
        .inline-form button { width:auto; margin:0 0 2px 8px; white-space:nowrap; }
        .chip-row { display:flex; flex-wrap:wrap; gap:12px; margin:8px 0 20px; }
        .chip { display:inline-block; padding:10px 16px; border-radius:999px; background:#111827; border:1px solid #374151; color:#dbeafe; }
        .chip.active { background:#1d4ed8; border-color:#2563eb; color:#eff6ff; }
        .section-title { margin:0 0 12px; }
        .tight-muted { color:#9ca3af; margin:0 0 16px; }
        .card-header { display:flex; justify-content:space-between; gap:16px; align-items:flex-start; margin-bottom:20px; }
        .card-header p { margin:0; }
        .summary-pill { display:inline-block; padding:10px 14px; border-radius:999px; background:#111827; border:1px solid #374151; color:#e5e7eb; white-space:nowrap; }
        .discord-button { display:inline-flex; align-items:center; justify-content:center; gap:10px; width:100%; max-width:100%; padding:12px 16px; border-radius:10px; background:#5865F2; color:#fff; font-weight:700; }
        .pagination { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:14px; flex-wrap:wrap; }
        .pagination-links { display:flex; align-items:center; gap:10px; }
        .pagination-link { display:inline-block; padding:8px 12px; border-radius:8px; background:#111827; border:1px solid #374151; color:#dbeafe; }
        .pagination-link.disabled { color:#6b7280; pointer-events:none; }
        .button-row { display:flex; flex-wrap:wrap; gap:12px; align-items:center; }
        .button-secondary { background:#374151; color:#f3f4f6; }
        .button-danger { background:#b91c1c; color:#fef2f2; }
        .notes-list { display:grid; gap:12px; margin-top:12px; }
        .note-item { padding:14px; border-radius:10px; background:#111827; border:1px solid #374151; }
        .note-meta { color:#9ca3af; font-size:0.92rem; margin-bottom:8px; }
        .note-body { color:#f3f4f6; white-space:pre-wrap; word-break:break-word; line-height:1.5; }
        .note-view, .note-edit { display:grid; gap:12px; }
        .note-actions { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-top:12px; }
        .note-actions form { margin:0; }
        .note-actions button { width:auto; }
        .is-hidden { display:none !important; }
        .note-edit-form { display:grid; gap:12px; }
        .note-edit-form textarea { min-height:88px; margin-bottom:0; }
        .form-tight textarea { min-height:100px; margin-bottom:12px; }
        .inline-action-form { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
        .inline-action-form select { margin:0; max-width:280px; }
        .inline-action-form button { width:auto; }
        .admin-tabs-shell { display:grid; gap:16px; }
        .admin-tabs { display:flex; gap:10px; flex-wrap:wrap; padding:8px; border-radius:12px; background:#1f2937; }
        .admin-tab-button { width:auto; padding:10px 14px; border:1px solid #374151; border-radius:10px; background:#111827; color:#d1d5db; font-weight:600; }
        .admin-tab-button.is-active { background:#2563eb; border-color:#2563eb; color:#eff6ff; }
        .admin-tab-panel { display:none; }
        .admin-tab-panel.is-active { display:block; }
        .admin-panel-stack { display:grid; gap:16px; }
        .admin-form-stack { display:grid; gap:14px; }
        .tag-list { display:grid; gap:12px; margin-top:12px; }
        .tag-row { padding:14px; border-radius:10px; background:#111827; border:1px solid #374151; }
        .tag-meta { color:#9ca3af; font-size:0.92rem; }
        .tag-view, .tag-edit { display:grid; gap:12px; }
        .tag-row-main { min-width:0; }
        .tag-view { grid-template-columns:minmax(0, 1fr) auto; align-items:flex-start; }
        .tag-view .tag-row-actions { justify-content:flex-end; }
        .tag-row-actions { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
        .tag-edit-form { display:grid; gap:12px; }
        .tag-edit-form input { width:100%; max-width:420px; margin:0; }
        .tag-edit-form button { width:auto; margin:0; }
        .tag-delete-form { margin:0; }
        .tag-delete-form button { width:auto; }
        .table-actions { display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
        .table-actions form { margin:0; }
        .table-actions button { width:auto; padding:8px 12px; }
        @media (max-width: 760px) {
            .topbar { flex-direction:column; align-items:flex-start; gap:12px; }
            .topbar-left { flex-direction:column; align-items:flex-start; gap:12px; }
            .admin-tabs { overflow-x:auto; flex-wrap:nowrap; }
            .admin-tab-button { white-space:nowrap; }
            .tag-view { grid-template-columns:1fr; }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="topbar-left">
            <div><strong>Discord Ticket Dashboard</strong></div>
            {% if viewer %}
            <nav class="topnav">
                <a href="/">Dashboard</a>
                {% if is_admin %}
                <a href="/stats">Stats</a>
                <a href="/admin">Admin</a>
                {% endif %}
            </nav>
            {% endif %}
        </div>
        <div>
            {% if viewer %}
            <div class="user-badge">
                {% if viewer.avatar_url %}<img src="{{ viewer.avatar_url }}" alt="avatar">{% endif %}
                <span>Signed in as {{ viewer.display_name }}{% if is_admin %} · Admin{% endif %} · <a href="/logout">Logout</a></span>
            </div>
            {% endif %}
        </div>
    </div>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
