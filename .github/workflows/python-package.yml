name: Python package

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m pip check

      - name: Compile Python sources
        run: |
          PYTHONPYCACHEPREFIX="$(mktemp -d)" python -m compileall support_ticket_bot bot.py dashboard.py

      - name: Smoke import project modules
        run: |
          python -c "import bot, dashboard, support_ticket_bot.bot_core, support_ticket_bot.dashboard.app"
